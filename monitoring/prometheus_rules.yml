groups:
  - name: synapse_fleet_health
    interval: 30s
    rules:
      - alert: VehicleFailureProbabilityHigh
        expr: fleet_failure_probability_72h > 0.7
        for: 5m
        labels:
          severity: warning
          team: fleet-ops
        annotations:
          summary: "Vehicle failure probability exceeds 70%"
          description: "Vehicle {{ $labels.vehicle_id }} has failure probability {{ $value | humanizePercentage }}"

      - alert: VehicleFailureProbabilityCritical
        expr: fleet_failure_probability_72h > 0.9
        for: 1m
        labels:
          severity: critical
          team: fleet-ops
        annotations:
          summary: "CRITICAL: Vehicle breakdown imminent"
          description: "Vehicle {{ $labels.vehicle_id }} requires immediate maintenance"

      - alert: FleetAnomalyDetected
        expr: fleet_anomaly_count_5m > 3
        for: 2m
        labels:
          severity: high
          team: fleet-ops
        annotations:
          summary: "Multiple fleet anomalies detected"

  - name: synapse_driver_safety
    interval: 15s
    rules:
      - alert: DriverFatigueCritical
        expr: driver_fatigue_probability > 0.8
        for: 1m
        labels:
          severity: critical
          team: safety
        annotations:
          summary: "Driver fatigue level critical"
          description: "Driver {{ $labels.driver_id }} fatigue probability: {{ $value | humanizePercentage }}"

      - alert: HOSViolationRisk
        expr: driver_hos_risk_score > 0.9
        for: 0m
        labels:
          severity: critical
          team: compliance
        annotations:
          summary: "HOS violation imminent"

  - name: synapse_performance
    interval: 60s
    rules:
      - alert: ETAMAEExceedsTarget
        expr: avg_over_time(routing_eta_mae_minutes[1h]) > 15
        for: 10m
        labels:
          severity: warning
          team: engineering
        annotations:
          summary: "ETA MAE exceeding target of 9.7 minutes"

      - alert: DecisionLatencyHigh
        expr: histogram_quantile(0.95, rate(mode_ddr_latency_seconds_bucket[5m])) > 0.3
        for: 5m
        labels:
          severity: warning
          team: engineering
        annotations:
          summary: "MODE-DDR p95 latency exceeds 300ms target"

      - alert: InsightFusionLatencyHigh
        expr: histogram_quantile(0.99, rate(insight_fusion_latency_seconds_bucket[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "State vector assembly p99 exceeds 50ms"

  - name: synapse_infrastructure
    interval: 30s
    rules:
      - alert: KafkaConsumerLag
        expr: kafka_consumer_lag > 10000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Kafka consumer lag exceeding threshold"

      - alert: ServiceDown
        expr: up{job=~"synapse-.*"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "SYNAPSE service is down"
          description: "Service {{ $labels.job }} is unreachable"

      - alert: OTPDropped
        expr: synapse_otp_rate < 0.95
        for: 15m
        labels:
          severity: high
          team: operations
        annotations:
          summary: "On-Time Performance below 95% threshold"
          description: "OTP at {{ $value | humanizePercentage }} (target: 97.8%)"
